<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Box - 12A3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">

    <nav class="flex justify-between items-center mb-12 relative">
    <div class="bg-orange-clay neo-brutalism px-6 py-2 font-black text-2xl uppercase italic text-white">12A3!</div>

    <div class="hidden md:flex gap-4">
        <a href="thanh-vien.html" class="bg-white neo-brutalism px-4 py-2 font-bold hover:bg-sage text-black">Thành viên</a>
        <a href="thay-co.html" class="bg-white neo-brutalism px-4 py-2 font-bold hover:bg-sage text-black">Thầy cô</a>
        <a href="thu-vien.html" class="bg-white neo-brutalism px-4 py-2 font-bold hover:bg-sage text-black">Kho ảnh dìm</a>
        <a href="loi-nhan.html" class="bg-white neo-brutalism px-4 py-2 font-bold hover:bg-sage text-black">Secret Box</a>
    </div>

    <button onclick="toggleMobileMenu()" class="md:hidden bg-white neo-brutalism p-2 border-2 border-black">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <div id="mobile-menu" class="hidden absolute top-full left-0 right-0 z-50 bg-white neo-brutalism mt-2 p-4 flex flex-col gap-4 shadow-2xl">
        <a href="thanh-vien.html" class="font-black uppercase border-b-2 border-black pb-2 text-black">Thành viên</a>
        <a href="thay-co.html" class="font-black uppercase border-b-2 border-black pb-2 text-black">Thầy cô</a>
        <a href="thu-vien.html" class="font-black uppercase border-b-2 border-black pb-2 text-black">Kho ảnh dìm</a>
        <a href="loi-nhan.html" class="font-black uppercase text-black">Secret Box</a>
    </div>
</nav>

    <div class="flex-grow flex items-center justify-center">
        <div class="bg-white neo-brutalism p-8 md:p-12 w-full max-w-2xl relative">
            <div class="absolute -top-6 -left-6 bg-black text-white neo-brutalism px-4 py-2 font-black rotate-12">BÍ MẬT 100%</div>
            
            <h1 class="text-5xl font-black mb-2 uppercase text-orange-clay">Secret Box</h1>
            <p class="font-bold text-gray-600 mb-8">Có điều gì bạn muốn nói với ai đó trong lớp mà chưa dám mở lời không? Cứ viết ở đây nhé, không ai biết bạn là ai đâu!</p>

            <form id="secretForm" class="flex flex-col gap-6">
                <div>
                    <label class="block font-black text-xl mb-2 uppercase">Gửi tới ai? (Tên/Biệt danh)</label>
                    <input type="text" id="recipient" required class="w-full border-4 border-black p-4 font-bold outline-none focus:bg-yellow-50" placeholder="VD: Bóng, Minh Lùn, Lớp trưởng...">
                </div>

                <div>
                    <label class="block font-black text-xl mb-2 uppercase">Lời nhắn của bạn</label>
                    <textarea id="message" required rows="5" class="w-full border-4 border-black p-4 font-bold outline-none focus:bg-yellow-50" placeholder="Viết những lời chân thật nhất vào đây..."></textarea>
                </div>

                <div class="flex gap-4 mt-4">
                    <button type="submit" class="bg-black text-white neo-brutalism px-8 py-4 font-black text-xl uppercase flex-grow hover:bg-orange-clay hover:text-black transition-colors">Gửi Lời Nhắn</button>
                    <button type="button" id="downloadBtn" class="bg-sage neo-brutalism px-8 py-4 font-black text-xl uppercase" title="Tải file JSON chứa dữ liệu">Tải JSON</button>
                </div>
            </form>
            
            <p id="statusMsg" class="mt-4 font-bold text-sage hidden">Đã lưu lời nhắn thành công!</p>
        </div>
    </div>

    <script src="secret.js"></script>
</body>
</html>
