<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cỗ Máy Thời Gian - 12A3</title>
    <link rel="icon" type="image/png" href="images/anhchung/logo.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-yellow-50 p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <nav class="flex justify-between items-center mb-12">
            <a href="index.html" class="bg-orange-clay neo-brutalism px-6 py-2 font-black text-2xl uppercase italic text-white hover:bg-black transition-all">12A3!</a>
            <a href="index.html" class="bg-white neo-brutalism px-4 py-2 font-bold hover:bg-sage">Quay lại</a>
        </nav>

        <header class="mb-12 text-center">
            <h1 class="text-5xl md:text-7xl font-black uppercase mb-4 leading-none">Cỗ Máy<br><span class="text-sage">Thời Gian</span></h1>
            <p class="text-xl font-bold italic">"Gửi một chút tâm tình cho bản thân của 5 năm sau..."</p>
        </header>

        <div class="bg-white neo-brutalism p-8 border-4 border-black">
            <form id="time-capsule-form" class="space-y-6">
                <div>
                    <label class="block font-black uppercase mb-2">Bạn là ai?</label>
                    <input type="text" id="future-name" required class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-200 outline-none" placeholder="Nhập tên của bạn...">
                </div>
                <div>
                    <label class="block font-black uppercase mb-2">Email nhận thư (năm 2031)</label>
                    <input type="email" id="future-email" required class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-200 outline-none" placeholder="email@gmail.com">
                </div>
                <div>
                    <label class="block font-black uppercase mb-2">Lời nhắn gửi tương lai</label>
                    <textarea id="future-message" rows="6" required class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-200 outline-none" placeholder="Bạn muốn nói gì với chính mình lúc 23 tuổi?"></textarea>
                </div>
                <button type="submit" class="w-full bg-sage text-white font-black py-4 uppercase text-xl neo-brutalism hover:bg-black transition-all">Niêm phong lá thư ✉️</button>
            </form>
        </div>
    </div>
    <footer class="text-center py-12 border-t-4 border-black">

        <p class="font-black text-xl uppercase">Thiết kế bởi 12A3 - Niên khóa 2023-2026</p>

        <p class="font-bold opacity-60 mt-2 italic">Dành riêng cho những người bạn mệnh Hỏa đầy nhiệt huyết.</p>
        <p>©️Vuong Dinh Tuong An 2026</p>

    </footer>
    <script src="main.js"></script>
</body>
</html>
