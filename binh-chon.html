        <nav class="flex justify-between items-center mb-10">

<body class="bg-blue-50 p-4">
    <div class="max-w-2xl mx-auto">

        <div id="vote-box" class="bg-white neo-brutalism p-6 border-4 border-black">
            <form id="voting-form" class="space-y-6">
                <div>
                    <label class="block font-black mb-2 uppercase text-sm">😴 Trùm ngủ gật</label>
                    <select id="vote-ngu-gat" required class="w-full border-4 border-black p-3 font-bold appearance-none bg-white outline-none focus:bg-yellow-100">
                        <option value="">-- Chọn thành viên --</option>
                    </select>
                </div>
                <div>
                    <label class="block font-black mb-2 uppercase text-sm">💃 Chiến thần văn nghệ</label>
                    <select id="vote-van-nghe" required class="w-full border-4 border-black p-3 font-bold appearance-none bg-white outline-none focus:bg-pink-100">
                        <option value="">-- Chọn thành viên --</option>
                    </select>
                </div>
                <div>
                    <label class="block font-black mb-2 uppercase text-sm">📚 Học thần A3</label>
                    <select id="vote-hoc-than" required class="w-full border-4 border-black p-3 font-bold appearance-none bg-white outline-none focus:bg-blue-100">
                        <option value="">-- Chọn thành viên --</option>
                    </select>
</div>


                <button type="submit" id="btn-submit" class="w-full bg-black text-white font-black py-4 uppercase neo-brutalism hover:bg-blue-400 transition-all">Gửi bình chọn</button>
            </form>
        </div>

        <div id="result-box" class="hidden mt-8 bg-white neo-brutalism p-6 border-4 border-black">
            <h2 class="text-2xl font-black uppercase mb-6">Kết quả bình chọn 📊</h2>
            <div class="space-y-8">
                <canvas id="chart-ngu-gat" height="250"></canvas>
                <canvas id="chart-van-nghe" height="250"></canvas>
                <canvas id="chart-hoc-than" height="250"></canvas>
            </div>
        </div>
    </div>
    <footer class="text-center py-12 border-t-4 border-black">

        <p class="font-black text-xl uppercase">Thiết kế bởi 12A3 - Niên khóa 2023-2026</p>
